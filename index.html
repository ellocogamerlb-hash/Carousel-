<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Carousel Boutique 🎠 | Pedidos Nube</title>
  <style>
    :root{
      --pink:#f8cdda;
      --pink-2:#f6b9ca;
      --rose:#d9869e;
      --cream:#fff8ef;
      --cream-2:#fff1df;
      --gold:#d7b56d;
      --gold-2:#f3dfad;
      --brown:#765245;
      --muted:#9b7a70;
      --green:#dfeada;
      --white:#fffdf8;
      --shadow:0 12px 28px rgba(154,93,110,.16);
      --shadow-soft:0 7px 18px rgba(154,93,110,.11);
      --radius:24px;
      --danger:#c96b75;
      --ok:#8aaa78;
      --warn:#c49b57;
      --blue:#8ca8ba;
      --ink:#4f3934;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0;
      font-family: "Georgia", "Times New Roman", serif;
      color:var(--ink);
      background:
        radial-gradient(circle at 10% 10%, rgba(255,255,255,.85) 0 8%, transparent 22%),
        radial-gradient(circle at 90% 5%, rgba(248,205,218,.55) 0 12%, transparent 28%),
        linear-gradient(160deg, #fff7ed 0%, #ffeef6 46%, #fffaf0 100%);
      min-height:100vh;
      padding-bottom:92px;
    }

    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(circle at 18px 18px, rgba(215,181,109,.16) 1.3px, transparent 1.6px);
      background-size:28px 28px;
      opacity:.55;
      z-index:-1;
    }

    /* Estilos de Autenticación */
    #auth-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 248, 239, 0.95);
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
      text-align: center;
    }

    .auth-card {
      background: white;
      padding: 40px;
      border-radius: 30px;
      box-shadow: var(--shadow);
      border: 1.5px solid var(--gold);
      max-width: 400px;
      width: 100%;
    }

    .google-btn {
      background: white;
      border: 1.5px solid var(--gold);
      padding: 12px 24px;
      border-radius: 999px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      color: var(--brown);
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 20px;
    }

    .google-btn:hover {
      background: var(--pink);
      transform: translateY(-2px);
    }

    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 18px;
      background: rgba(255, 255, 255, 0.6);
      border-radius: 999px;
      margin-bottom: 10px;
      font-size: 12px;
      border: 1px solid rgba(215, 181, 109, 0.2);
    }

    .logout-link {
      color: var(--rose);
      text-decoration: underline;
      cursor: pointer;
    }

    /* Resto de estilos originales */
    button,input,select,textarea{font-family: inherit;}
    .app{width:min(100%, 620px); margin:0 auto; padding:18px 14px 20px;}
    .hero{position:relative; overflow:hidden; padding:22px 18px; border:1.5px solid rgba(215,181,109,.42); border-radius:30px; background: linear-gradient(135deg, rgba(255,253,248,.95), rgba(255,238,246,.94)); box-shadow:var(--shadow); margin-bottom:14px;}
    .hero:after{content:"Carousel"; position:absolute; right:15px; top:14px; font-size:54px; opacity:.18; transform:rotate(-8deg);}
    .brand{display:flex; align-items:center; gap:10px; margin-bottom:6px;}
    .logo{width:48px;height:48px; border-radius:50%; display:grid; place-items:center; background:linear-gradient(145deg, #fff8ef, #f8cdda); border:1.5px solid var(--gold); box-shadow: inset 0 0 0 4px rgba(255,255,255,.55), var(--shadow-soft); font-size:25px;}
    h1,h2,h3{margin:0}
    h1{font-size:25px; color:#7e504b; line-height:1.1;}
    .subtitle{color:var(--muted); font-size:14px; margin-top:5px;}
    .section{display:none; animation:fade .22s ease}
    .section.active{display:block}
    @keyframes fade{from{opacity:.35; transform:translateY(6px)} to{opacity:1; transform:none}}
    .card{background:rgba(255,253,248,.92); border:1.4px solid rgba(215,181,109,0.32); border-radius:var(--radius); box-shadow:var(--shadow-soft); padding:15px; margin:13px 0; position:relative; overflow:hidden;}
    .title-row{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px;}
    .section-title{font-size:20px; color:#7b4c48;}
    .grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
    .stat{padding:13px 10px; border-radius:20px; background:linear-gradient(145deg, #fffaf2, #fff1f7); border:1px solid rgba(215,181,109,0.26);}
    .stat b{display:block;font-size:19px;color:#7c514b}
    .stat span{font-size:12px;color:var(--muted)}
    label{display:block; font-weight:bold; color:#714c45; font-size:13px; margin:10px 0 6px;}
    input,select,textarea{width:100%; border:1.3px solid rgba(215,181,109,.42); background:#fffdf9; border-radius:17px; padding:12px; font-size:15px; outline:none;}
    .btn{border:0; border-radius:18px; padding:12px 13px; font-size:14px; color:#fff; background:linear-gradient(145deg, var(--rose), #c9768d); cursor:pointer; font-weight:bold; width:100%; margin-top:10px;}
    .btn.secondary{color:#7a514b; background:#fff8ef; border:1px solid var(--gold); width:auto;}
    .list{display:grid; gap:10px;}
    .order-card{border-radius:20px; border:1px solid rgba(215,181,109,.34); background:white; padding:12px; margin-bottom:10px;}
    .tag{padding:4px 8px; border-radius:999px; font-size:11px; background:var(--pink); color:var(--brown);}
    
    /* Toast */
    .toast{position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--brown); color:white; padding:10px 20px; border-radius:999px; display:none; z-index:2000;}
  </style>
</head>
<body>

  <!-- Pantalla de Inicio de Sesión -->
  <div id="auth-overlay">
    <div class="auth-card">
      <div class="logo" style="margin: 0 auto 20px;">🎠</div>
      <h2>Carousel Boutique</h2>
      <p style="color: var(--muted); margin-top: 10px;">Inicia sesión para sincronizar tus pedidos en la nube ☁️</p>
      <button class="google-btn" id="login-btn">
        <svg width="20" height="20" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Entrar con Google
      </button>
    </div>
  </div>

  <main class="app" id="main-app" style="display:none;">
    <div class="user-bar">
      <span id="user-display">Cargando...</span>
      <span class="logout-link" id="logout-btn">Cerrar sesión</span>
    </div>

    <header class="hero">
      <div class="brand">
        <div class="logo">🎠</div>
        <div>
          <h1>Carousel Boutique</h1>
          <p class="subtitle">Panel de pedidos en la nube 💗</p>
        </div>
      </div>
    </header>

    <section id="inicio" class="section active">
      <div class="card">
        <div class="title-row">
          <h2 class="section-title">Resumen 🎀</h2>
        </div>
        <div class="grid">
          <div class="stat"><b id="sumSold">$0</b><span>Total</span></div>
          <div class="stat"><b id="sumPending">0</b><span>Pendientes</span></div>
        </div>
      </div>

      <div class="card">
        <div class="title-row">
          <h2 class="section-title">Nuevo Pedido ✿</h2>
        </div>
        <form id="orderForm">
          <label>Clienta</label>
          <input id="clientName" placeholder="Nombre" required>
          <label>Producto</label>
          <input id="product" placeholder="¿Qué pidió?" required>
          <label>Total $</label>
          <input id="price" type="number" value="0">
          <button type="submit" class="btn">💾 Guardar en la Nube</button>
        </form>
      </div>

      <div class="card">
        <h2 class="section-title">Mis Pedidos 🎀</h2>
        <div id="ordersList" class="list" style="margin-top:15px;">
          <p style="text-align:center; color:var(--muted);">Cargando pedidos...</p>
        </div>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, orderBy, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBDAwVLfMO60ge95Uiz0bXcP0NoiXjqwCg",
      authDomain: "notas-carousel.firebaseapp.com",
      projectId: "notas-carousel",
      storageBucket: "notas-carousel.firebasestorage.app",
      messagingSenderId: "876293712386",
      appId: "1:876293712386:web:27fd60b9e6201d82bf551b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let user = null;

    // UI Elements
    const authOverlay = document.getElementById('auth-overlay');
    const mainApp = document.getElementById('main-app');
    const loginBtn = document.getElementById('login-btn');
    const logoutBtn = document.getElementById('logout-btn');
    const userDisplay = document.getElementById('user-display');
    const orderForm = document.getElementById('orderForm');
    const ordersList = document.getElementById('ordersList');
    const toast = document.getElementById('toast');

    function showToast(msg) {
      toast.textContent = msg;
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 3000);
    }

    // Auth Logic
    loginBtn.onclick = () => signInWithPopup(auth, provider).catch(e => alert("Error: " + e.message));
    logoutBtn.onclick = () => signOut(auth);

    onAuthStateChanged(auth, (u) => {
      if (u) {
        user = u;
        userDisplay.textContent = "Hola, " + u.displayName.split(' ')[0] + " ✨";
        authOverlay.style.display = 'none';
        mainApp.style.display = 'block';
        loadOrders();
      } else {
        user = null;
        authOverlay.style.display = 'flex';
        mainApp.style.display = 'none';
      }
    });

    // Database Logic
    orderForm.onsubmit = async (e) => {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.disabled = true;
      btn.textContent = "Guardando...";

      try {
        await addDoc(collection(db, "pedidos"), {
          uid: user.uid,
          client: document.getElementById('clientName').value,
          product: document.getElementById('product').value,
          price: parseFloat(document.getElementById('price').value),
          date: new Date()
        });
        showToast("¡Pedido guardado en la nube! ☁️");
        orderForm.reset();
      } catch (err) {
        alert("Error al guardar: " + err.message);
      } finally {
        btn.disabled = false;
        btn.textContent = "💾 Guardar en la Nube";
      }
    };

    function loadOrders() {
      const q = query(collection(db, "pedidos"), where("uid", "==", user.uid), orderBy("date", "desc"));
      onSnapshot(q, (snap) => {
        ordersList.innerHTML = "";
        let total = 0;
        let count = 0;

        if (snap.empty) {
          ordersList.innerHTML = "<p style='text-align:center; color:var(--muted);'>No hay pedidos aún 🎀</p>";
        }

        snap.forEach(d => {
          const p = d.data();
          total += p.price;
          count++;
          const div = document.createElement('div');
          div.className = "order-card";
          div.innerHTML = `
            <div style="display:flex; justify-content:space-between;">
              <b>${p.client}</b>
              <span style="color:var(--rose); font-weight:bold;">$${p.price}</span>
            </div>
            <div style="font-size:13px; color:var(--muted); margin-top:5px;">${p.product}</div>
            <button onclick="window.deleteOrder('${d.id}')" style="background:none; border:none; color:var(--danger); font-size:11px; margin-top:10px; cursor:pointer; padding:0;">🗑 Eliminar</button>
          `;
          ordersList.appendChild(div);
        });

        document.getElementById('sumSold').textContent = "$" + total;
        document.getElementById('sumPending').textContent = count;
      });
    }

    window.deleteOrder = async (id) => {
      if(confirm("¿Borrar este pedido?")) {
        await deleteDoc(doc(db, "pedidos", id));
        showToast("Pedido eliminado");
      }
    };
  </script>
</body>
</html>
